name: endpoint_security_checkin
description: Cross-platform endpoint protection check-in for employees.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  crypto: ^3.0.6
  device_info_plus: ^13.1.0
  http: ^1.2.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/branding/helixiora_icon_dark_blue.png'
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#FFFFFF'
  web:
    generate: true
    image_path: 'assets/branding/helixiora_icon_dark_blue.png'
    background_color: '#FFFFFF'
    theme_color: '#081847'
  windows:
    generate: true
    image_path: 'assets/branding/helixiora_icon_dark_blue.png'
    icon_size: 64
  macos:
    generate: true
    image_path: 'assets/branding/helixiora_icon_dark_blue.png'
