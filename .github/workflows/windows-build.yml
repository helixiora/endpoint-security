name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Build Windows release
        shell: pwsh
        env:
          ORGANIZATION_NAME: ${{ vars.ORGANIZATION_NAME }}
          SUBMISSION_ENDPOINT: ${{ secrets.SUBMISSION_ENDPOINT }}
        run: |
          $organization = if ($env:ORGANIZATION_NAME) { $env:ORGANIZATION_NAME } else { "Helixiora" }
          $appVersion = (git describe --tags --always --dirty).Trim()
          ./scripts/build-windows.ps1 `
            -OrganizationName $organization `
            -AppVersion $appVersion `
            -SubmissionEndpoint $env:SUBMISSION_ENDPOINT `
            -ZipArtifact

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: helixiora-endpoint-security-windows
          path: build/windows/helixiora-endpoint-security-windows.zip
          if-no-files-found: error
