name: Build All Platforms

on:
  workflow_dispatch:

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build:
    name: Build ${{ matrix.label }}
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Web
            os: ubuntu-latest
            build_command: flutter build web
            artifact_name: helixiora-web
            artifact_path: build/web
            shell: bash
            install_linux_deps: false
            setup_java: false
          - label: Linux
            os: ubuntu-latest
            build_command: flutter build linux --release
            artifact_name: helixiora-linux
            artifact_path: build/linux/x64/release/bundle
            shell: bash
            install_linux_deps: true
            setup_java: false
          - label: Android APK
            os: ubuntu-latest
            build_command: flutter build apk --release
            artifact_name: helixiora-android-apk
            artifact_path: build/app/outputs/flutter-apk/app-release.apk
            shell: bash
            install_linux_deps: false
            setup_java: true
          - label: Windows
            os: windows-latest
            build_command: flutter build windows --release
            artifact_name: helixiora-windows
            artifact_path: build/windows/x64/runner/Release
            shell: pwsh
            install_linux_deps: false
            setup_java: false
          - label: macOS
            os: macos-latest
            build_command: flutter build macos --release
            artifact_name: helixiora-macos
            artifact_path: build/macos/Build/Products/Release/Helixiora Endpoint Security.app
            shell: bash
            install_linux_deps: false
            setup_java: false
          - label: iOS Unsigned
            os: macos-latest
            build_command: flutter build ios --release --no-codesign
            artifact_name: helixiora-ios-unsigned
            artifact_path: build/ios/iphoneos
            shell: bash
            install_linux_deps: false
            setup_java: false

    env:
      ORGANIZATION_NAME: ${{ vars.ORGANIZATION_NAME || 'Helixiora' }}
      SUBMISSION_ENDPOINT: ${{ secrets.SUBMISSION_ENDPOINT }}
      SUBMISSION_SECRET: ${{ secrets.SUBMISSION_SECRET }}
      HELIXIORA_ANDROID_KEYSTORE_BASE64: ${{ secrets.HELIXIORA_ANDROID_KEYSTORE_BASE64 }}
      HELIXIORA_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.HELIXIORA_ANDROID_KEYSTORE_PASSWORD }}
      HELIXIORA_ANDROID_KEY_ALIAS: ${{ secrets.HELIXIORA_ANDROID_KEY_ALIAS }}
      HELIXIORA_ANDROID_KEY_PASSWORD: ${{ secrets.HELIXIORA_ANDROID_KEY_PASSWORD }}
      APP_VERSION: ''

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        if: matrix.setup_java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Linux desktop dependencies
        if: matrix.install_linux_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve app version
        if: matrix.shell == 'bash'
        shell: bash
        run: echo "APP_VERSION=$(./scripts/git-version.sh)" >> "$GITHUB_ENV"

      - name: Resolve app version (Windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $appVersion = (git describe --tags --always --dirty).Trim()
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Android release signing
        if: matrix.label == 'Android APK' && env.HELIXIORA_ANDROID_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/helixiora-android-release.jks"
          printf '%s' "$HELIXIORA_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "HELIXIORA_ANDROID_KEYSTORE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build artifact (Unix)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          args=(
            --dart-define=ORGANIZATION_NAME="$ORGANIZATION_NAME"
            --dart-define=APP_VERSION="$APP_VERSION"
          )
          if [ -n "$SUBMISSION_ENDPOINT" ]; then
            args+=(--dart-define=SUBMISSION_ENDPOINT="$SUBMISSION_ENDPOINT")
          fi
          if [ -n "$SUBMISSION_SECRET" ]; then
            args+=(--dart-define=SUBMISSION_SECRET="$SUBMISSION_SECRET")
          fi
          ${{ matrix.build_command }} "${args[@]}"

      - name: Build artifact (Windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $args = @(
            "--dart-define=ORGANIZATION_NAME=$env:ORGANIZATION_NAME"
            "--dart-define=APP_VERSION=$env:APP_VERSION"
          )
          if ($env:SUBMISSION_ENDPOINT) {
            $args += "--dart-define=SUBMISSION_ENDPOINT=$env:SUBMISSION_ENDPOINT"
          }
          if ($env:SUBMISSION_SECRET) {
            $args += "--dart-define=SUBMISSION_SECRET=$env:SUBMISSION_SECRET"
          }
          & flutter build windows --release @args

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
